[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
]

# RPC endpoints read from env (PC1 — testnet-first, never hardcode keys/mainnet).
# Example: SEPOLIA_RPC_URL=... AMOY_RPC_URL=... forge script ...
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
amoy = "${AMOY_RPC_URL}"
